# Talk2Database — self-hosted bundle.
#
#   docker compose up -d --build
#
# Everything is configured through the single .env file (see .env.example).
# Data sources are NOT defined here: each user registers connections to their
# own databases (PostgreSQL, MySQL, MariaDB, ...) at runtime via the UI.

services:
  # --------------------------------------------------------------------- #
  # Panel metadata DB: users, connections, query history, schema snapshots.
  # --------------------------------------------------------------------- #
  postgres-panel:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PANEL_DB_USER}
      POSTGRES_PASSWORD: ${PANEL_DB_PASSWORD}
      POSTGRES_DB: ${PANEL_DB_NAME}
    volumes:
      - panel_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PANEL_DB_USER} -d ${PANEL_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------- #
  # Panel: FastAPI API + built React SPA. Single user-facing endpoint.     #
  # --------------------------------------------------------------------- #
  panel:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres-panel:
        condition: service_healthy

volumes:
  panel_data:
